name: Build Unsigned iOS IPA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java (Required for Flutter)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: flutter pub get

      # BƯỚC THẦN THÁNH: Tự động cấu hình file Xcode gốc để bỏ qua Development Team
      - name: Bypass Apple Development Team Check
        run: |
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          sed -i '' 's/DEVELOPMENT_TEAM = "";//g' ios/Runner.xcodeproj/project.pbxproj

      - name: Build iOS Frameworks (No Code Sign)
        run: |
          flutter build ios --release --no-codesign --obfuscate --split-debug-info=build/app/outputs/symbols

      - name: Package App into Unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r SmoothPlayer_Unsigned.ipa Payload

      - name: Upload IPA to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SmoothPlayer-iOS-IPA
          path: SmoothPlayer_Unsigned.ipa
